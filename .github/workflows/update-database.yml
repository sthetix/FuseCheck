name: Auto-Update Database

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - 'scripts/update_db.py'

jobs:
  update-db:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest firmware info from FuseNCA
        id: fetch_firmware
        run: |
          curl -s "https://raw.githubusercontent.com/sthetix/FuseNCA/master/fuses.json" | \
            python3 -c "import sys, json; data=json.load(sys.stdin); versions=[v['version'] for v in data['data']]; print('latest_fw=' + max(versions, key=lambda v: tuple(map(int, v.split('.')))))" >> $GITHUB_OUTPUT

      - name: Generate database from FuseNCA
        run: |
          python3 scripts/update_db.py -o fusecheck_db.txt

      - name: Check for database changes
        id: check_changes
        run: |
          if git diff --quiet fusecheck_db.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No database changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Database changes detected!"
            echo "Latest firmware: ${{ steps.fetch_firmware.outputs.latest_fw }}"
          fi

      - name: Update release zip
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download existing release zip
          gh release download v1.0.1 --dir output_download --pattern 'FuseCheck-*.zip'

          if [ -f "output_download/FuseCheck-1.0.1.zip" ]; then
            echo "Updating existing v1.0.1 zip..."
            ZIP_FILE="output_download/FuseCheck-1.0.1.zip"
          else
            echo "No existing zip found, using placeholder"
            ZIP_FILE=""
          fi

          # Create updated zip
          rm -rf zip_tmp
          mkdir -p zip_tmp/bootloader/payloads
          mkdir -p zip_tmp/config/fusecheck

          if [ -n "$ZIP_FILE" ] && [ -f "$ZIP_FILE" ]; then
            # Extract existing zip
            unzip -q "$ZIP_FILE" -d zip_tmp
          fi

          # Update with new database
          cp fusecheck_db.txt zip_tmp/config/fusecheck/

          # Rezip
          cd zip_tmp && zip -r ../FuseCheck-1.0.1.zip . && cd ..

          echo "Zip created: $(ls -lh FuseCheck-1.0.1.zip)"
          rm -rf output_download zip_tmp

      - name: Update release
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create release notes
          DATE="$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          COUNT=$(grep -c "^\[NCA\]" fusecheck_db.txt || echo "0")

          cat > release_notes.md << 'EOF'
          # FuseCheck v1.0.1

          **Latest supported firmware: {LATEST_FW}**

          ## What is FuseCheck?
          A Nintendo Switch fuse checker that detects your firmware version and burnt fuses to determine if your system can boot OFW safely.

          ## Installation
          1. Download `FuseCheck-1.0.1.zip`
          2. Extract to your SD card
          3. Run via Hekate payload

          ## Database Information
          - Database sourced from [FuseNCA](https://github.com/sthetix/FuseNCA)
          - Auto-generated on: {DATE}
          - Total firmware versions supported: {COUNT}

          ## How it works
          - Reads fuse counts from hardware (ODM6/ODM7)
          - Detects firmware from SystemVersion NCA
          - Compares against the database
          - Shows if your system can boot OFW

          ---

          *This release is automatically updated when new firmware is released.*
          EOF

          # Replace placeholders
          sed -i "s/{LATEST_FW}/${{ steps.fetch_firmware.outputs.latest_fw }}/g" release_notes.md
          sed -i "s/{DATE}/$DATE/g" release_notes.md
          sed -i "s/{COUNT}/$COUNT/g" release_notes.md

          # Update existing release
          gh release edit v1.0.1 \
            --notes-file release_notes.md \
            --title "FuseCheck v1.0.1 (FW ${{ steps.fetch_firmware.outputs.latest_fw }})" 2>/dev/null || \
          gh release create v1.0.1 \
            --title "FuseCheck v1.0.1 (FW ${{ steps.fetch_firmware.outputs.latest_fw }})" \
            --notes-file release_notes.md \
            --latest

          # Delete old zip asset if exists and upload new one
          for ASSET_URL in $(gh api repos/${{ github.repository }}/releases/tags/v1.0.1 --jq '.assets[] | select(.name | startswith("FuseCheck-")) | .url'); do
            gh api -X DELETE "$ASSET_URL"
            echo "Deleted asset: $ASSET_URL"
          done

          gh release upload v1.0.1 "FuseCheck-1.0.1.zip"

      - name: Commit database changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fusecheck_db.txt
          git commit -m "chore: update database to FW ${{ steps.fetch_firmware.outputs.latest_fw }}"
          git push
